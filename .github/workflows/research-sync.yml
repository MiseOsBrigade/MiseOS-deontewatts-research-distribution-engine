name: Research Sync

on:
  push:
    branches: [main]
    paths:
      - "uploads/**"
      - "metadata/research.json"
  workflow_dispatch:
    inputs:
      publish_zenodo:
        description: "Publish the queued Zenodo record permanently"
        required: true
        type: boolean
        default: false
      continue_backlog:
        description: "Internal: set by Research Sync itself to advance the backlog after an automatic sync. Leave false for a manual run."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: research-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.promote.outputs.ready }}
      head_sha: ${{ steps.head_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Reject incompatible manual inputs
        if: github.event_name == 'workflow_dispatch' && inputs.continue_backlog && inputs.publish_zenodo
        run: |
          echo "continue_backlog and publish_zenodo cannot both be true: continue_backlog advances the backlog to a different record, while publish_zenodo requires acting on the specific record already staged and reviewed for production. Dispatch these separately." >&2
          exit 1

      - name: Promote next queued record into queue/current.json
        id: promote
        env:
          CONTINUE_BACKLOG: ${{ github.event_name == 'workflow_dispatch' && inputs.continue_backlog && !inputs.publish_zenodo && 'true' || 'false' }}
        run: node scripts/promote-queue.mjs

      - name: Validate metadata and one-record queue
        if: steps.promote.outputs.ready == 'true'
        run: |
          node scripts/validate-metadata.mjs
          node scripts/validate-queue.mjs

      - name: Commit promoted queue state
        if: steps.promote.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue/current.json queue/pending.json data/research-index.json records
          if git diff --cached --quiet; then
            echo "No promotion changes to commit."
          else
            git commit -m "sync: promote next queued record for Zenodo Sandbox"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Record the commit the Zenodo job must check out
        id: head_sha
        if: steps.promote.outputs.ready == 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: No record ready
        if: steps.promote.outputs.ready != 'true'
        run: echo "No queued record has its canonical file attached yet; skipping the Zenodo stage for this run."

  zenodo:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.ready == 'true'
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo && 'zenodo-production' || 'zenodo-sandbox' }}
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo && 'zenodo-production' || 'zenodo-sandbox' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.head_sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate Zenodo environment configuration
        shell: bash
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$ZENODO_ACCESS_TOKEN" || { echo "Missing environment secret: ZENODO_ACCESS_TOKEN in ${TARGET_ENVIRONMENT}." >&2; exit 1; }
          test -n "$ZENODO_BASE_URL" || { echo "Missing environment variable: ZENODO_BASE_URL in ${TARGET_ENVIRONMENT}." >&2; exit 1; }
          if [[ "$TARGET_ENVIRONMENT" == "zenodo-sandbox" && "$ZENODO_BASE_URL" != "https://sandbox.zenodo.org/api" ]]; then
            echo "zenodo-sandbox must use https://sandbox.zenodo.org/api" >&2
            exit 1
          fi
          if [[ "$TARGET_ENVIRONMENT" == "zenodo-production" && "$ZENODO_BASE_URL" != "https://zenodo.org/api" ]]; then
            echo "zenodo-production must use https://zenodo.org/api" >&2
            exit 1
          fi

      - name: Create Zenodo draft, upload queued file, and optionally publish
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
          PUBLISH_ZENODO: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo || false }}
        run: node scripts/zenodo-sync.mjs

      - name: Persist Zenodo result in the catalog
        run: node scripts/update-distribution.mjs dist/zenodo-result.json

      - name: Run ORCID enrichment after DOI reservation
        continue-on-error: true
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_API_BASE: ${{ vars.ORCID_API_BASE }}
        shell: bash
        run: |
          set -euo pipefail
          if jq -e '.reserved_doi != null and .reserved_doi != ""' dist/zenodo-result.json >/dev/null; then
            node scripts/orcid-enrich.mjs
          else
            echo "No reserved DOI; ORCID enrichment remains blocked."
          fi

      - name: Commit catalog state
        id: commit_catalog
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research-index.json records queue/current.json queue/pending.json reports 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No catalog state changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            record_id=$(jq -r '.record_id' queue/current.json)
            git commit -m "sync: record Zenodo state for ${record_id}"
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Continue the backlog
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.continue_backlog)) && steps.commit_catalog.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "A single push can attach canonical files for more than one pending record, but only one is synced per run (max_active_records)."
          echo "Dispatching Research Sync again so the next ready record isn't stuck waiting for an unrelated push."
          gh workflow run research-sync.yml --ref "${GITHUB_REF_NAME}" -f publish_zenodo=false -f continue_backlog=true

      - name: Ensure a result report exists
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p dist
          if [[ ! -f dist/zenodo-result.json ]]; then
            jq -n \
              --arg status "failed-before-result" \
              --arg environment "$TARGET_ENVIRONMENT" \
              --arg run_id "$GITHUB_RUN_ID" \
              --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
              '{status: $status, environment: $environment, run_id: $run_id, run_attempt: $run_attempt, published: false}' \
              > dist/zenodo-result.json
          fi

      - name: Upload Zenodo result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: zenodo-result-${{ github.run_id }}
          path: dist/zenodo-result.json
          if-no-files-found: error
          retention-days: 30

  verify:
    runs-on: ubuntu-latest
    needs: zenodo
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v5
      - name: Document verification endpoints
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_API_BASE: ${{ vars.ORCID_API_BASE }}
          CROSSREF_API_BASE: ${{ vars.CROSSREF_API_BASE }}
          CROSSREF_MAILTO: ${{ vars.CROSSREF_MAILTO }}
          OPENAIRE_API_BASE: ${{ vars.OPENAIRE_API_BASE }}
        run: |
          echo "ORCID public record: ${ORCID_API_BASE}/${ORCID_ID}"
          echo "Crossref API: ${CROSSREF_API_BASE}"
          echo "Crossref polite-pool contact configured: $([ -n "$CROSSREF_MAILTO" ] && echo yes || echo no)"
          echo "OpenAIRE API: ${OPENAIRE_API_BASE}"
