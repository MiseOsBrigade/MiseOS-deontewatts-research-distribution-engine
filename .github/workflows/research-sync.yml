name: Research Sync

on:
  push:
    paths:
      - "uploads/**"
      - "metadata/research.json"
  workflow_dispatch:
    inputs:
      publish_zenodo:
        description: "Publish the Zenodo record permanently"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: research-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate research metadata
        run: node scripts/validate-metadata.mjs

      - name: Confirm queued files
        run: |
          count=$(find uploads -type f ! -name README.md ! -name .gitkeep | wc -l | tr -d ' ')
          test "$count" -gt 0 || { echo "No research files are queued in uploads/."; exit 1; }
          echo "Queued research files: $count"

  zenodo:
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo && 'zenodo-production' || 'zenodo-sandbox' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create Zenodo draft, upload files, and optionally publish
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
          PUBLISH_ZENODO: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo || false }}
          RESEARCH_UPLOAD_DIR: uploads
        run: node scripts/zenodo-sync.mjs

      - name: Upload Zenodo result
        uses: actions/upload-artifact@v4
        with:
          name: zenodo-result-${{ github.run_id }}
          path: dist/zenodo-result.json
          retention-days: 30

  verify:
    runs-on: ubuntu-latest
    needs: zenodo
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - name: Document verification endpoints
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_API_BASE: ${{ vars.ORCID_API_BASE }}
          CROSSREF_API_BASE: ${{ vars.CROSSREF_API_BASE }}
          CROSSREF_MAILTO: ${{ vars.CROSSREF_MAILTO }}
        run: |
          echo "ORCID public record: ${ORCID_API_BASE}/${ORCID_ID}"
          echo "Crossref API: ${CROSSREF_API_BASE}"
          echo "Crossref polite-pool contact configured: $([ -n "$CROSSREF_MAILTO" ] && echo yes || echo no)"
