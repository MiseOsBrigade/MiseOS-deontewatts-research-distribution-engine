name: Research Sync

on:
  push:
    paths:
      - "uploads/**"
      - "records/**"
      - "queue/current.json"
      - "metadata/research.json"
  workflow_dispatch:
    inputs:
      publish_zenodo:
        description: "Publish the queued Zenodo record permanently"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: research-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate queued catalog record
        run: |
          node -e 'const fs=require("fs"); const q=JSON.parse(fs.readFileSync("queue/current.json")); if(!q.record_id||!q.metadata_path||!Array.isArray(q.files)||!q.files.length) throw new Error("Invalid queue"); if(!fs.existsSync(q.metadata_path)) throw new Error(`Missing ${q.metadata_path}`); for(const f of q.files) if(!fs.existsSync(f)) throw new Error(`Missing ${f}`); console.log(`Queued ${q.record_id}`);'

  zenodo:
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo && 'zenodo-production' || 'zenodo-sandbox' }}
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo && 'zenodo-production' || 'zenodo-sandbox' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate Zenodo environment configuration
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$ZENODO_ACCESS_TOKEN" || { echo "Missing ZENODO_ACCESS_TOKEN in ${TARGET_ENVIRONMENT}." >&2; exit 1; }
          test -n "$ZENODO_BASE_URL" || { echo "Missing ZENODO_BASE_URL in ${TARGET_ENVIRONMENT}." >&2; exit 1; }
          [[ "$TARGET_ENVIRONMENT" != "zenodo-sandbox" || "$ZENODO_BASE_URL" == "https://sandbox.zenodo.org/api" ]]
          [[ "$TARGET_ENVIRONMENT" != "zenodo-production" || "$ZENODO_BASE_URL" == "https://zenodo.org/api" ]]
      - name: Deposit queued record
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
          PUBLISH_ZENODO: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_zenodo || false }}
        run: node scripts/zenodo-sync.mjs
      - name: Ensure result report exists
        if: ${{ always() }}
        run: |
          mkdir -p dist
          test -f dist/zenodo-result.json || jq -n --arg status "failed-before-result" --arg environment "$TARGET_ENVIRONMENT" '{status:$status,environment:$environment,published:false}' > dist/zenodo-result.json
      - name: Update catalog distribution status
        if: ${{ always() }}
        run: node scripts/update-distribution.mjs dist/zenodo-result.json
      - name: Commit catalog status
        if: ${{ always() }}
        run: |
          git config user.name "research-distribution-bot"
          git config user.email "research-distribution-bot@users.noreply.github.com"
          git add data/research-index.json records queue/current.json
          git diff --cached --quiet || git commit -m "chore: record Zenodo distribution result"
          git push
      - name: Upload Zenodo result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: zenodo-result-${{ github.run_id }}
          path: dist/zenodo-result.json
          if-no-files-found: error
          retention-days: 30

  verify:
    runs-on: ubuntu-latest
    needs: zenodo
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - name: Document verification endpoints
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_API_BASE: ${{ vars.ORCID_API_BASE }}
          CROSSREF_API_BASE: ${{ vars.CROSSREF_API_BASE }}
          CROSSREF_MAILTO: ${{ vars.CROSSREF_MAILTO }}
          OPENAIRE_API_BASE: ${{ vars.OPENAIRE_API_BASE }}
        run: |
          echo "ORCID public record: ${ORCID_API_BASE}/${ORCID_ID}"
          echo "Crossref API: ${CROSSREF_API_BASE}"
          echo "Crossref polite-pool contact configured: $([ -n "$CROSSREF_MAILTO" ] && echo yes || echo no)"
          echo "OpenAIRE API: ${OPENAIRE_API_BASE}"
