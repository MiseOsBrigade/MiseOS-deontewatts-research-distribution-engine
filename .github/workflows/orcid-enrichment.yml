name: ORCID Enrichment

on:
  workflow_dispatch:
    inputs:
      write_back:
        description: "Write eligible DOI-backed records to ORCID Member API"
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Analyze ORCID public works and update catalog
        env:
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_API_BASE: ${{ vars.ORCID_API_BASE }}
        run: node scripts/orcid-enrich.mjs
      - name: Optional ORCID Member API write-back
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.write_back }}
        env:
          ORCID_WRITE_ENABLED: "true"
          ORCID_ID: ${{ vars.ORCID_ID }}
          ORCID_MEMBER_API_BASE: ${{ vars.ORCID_MEMBER_API_BASE }}
          ORCID_ACCESS_TOKEN: ${{ secrets.ORCID_ACCESS_TOKEN }}
        run: node scripts/orcid-write.mjs
      - name: Commit enrichment results
        run: |
          git config user.name "research-distribution-bot"
          git config user.email "research-distribution-bot@users.noreply.github.com"
          git add data/research-index.json records reports/orcid-analysis.json
          git diff --cached --quiet || git commit -m "chore: refresh ORCID enrichment status"
          git push
