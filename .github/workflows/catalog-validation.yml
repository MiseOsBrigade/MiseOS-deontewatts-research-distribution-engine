name: Catalog Validation

on:
  pull_request:
    paths:
      - "data/**"
      - "records/**"
      - "queue/**"
      - "scripts/**"
      - "console/**"
  push:
    paths:
      - "data/**"
      - "records/**"
      - "queue/**"
      - "scripts/**"
      - "console/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate worker syntax
        run: |
          node --check scripts/catalog-lib.mjs
          node --check scripts/zenodo-sync.mjs
          node --check scripts/update-distribution.mjs
          node --check scripts/orcid-enrich.mjs
          node --check scripts/orcid-write.mjs
          node --check scripts/repository-ingest.mjs
      - name: Validate JSON and catalog references
        run: |
          files=$(find data records queue schema -name '*.json' -type f 2>/dev/null || true)
          if [ -n "$files" ]; then node -e 'const fs=require("fs"); for (const f of process.argv.slice(1)) JSON.parse(fs.readFileSync(f,"utf8"));' $files; fi
          node -e 'const fs=require("fs"); const i=JSON.parse(fs.readFileSync("data/research-index.json")); for (const r of i.records||[]) if(!fs.existsSync(r.record_path)) throw new Error(`Missing ${r.record_path}`); console.log(`Validated ${i.records.length} records`);'
      - name: Validate console
        working-directory: console
        run: |
          npm ci
          npm run typecheck
          npm run build
