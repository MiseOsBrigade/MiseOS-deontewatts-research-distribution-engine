name: Queue Sandbox Validation

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: queue-sandbox-validation
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest
    environment: zenodo-sandbox

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Confirm Sandbox configuration exists
        shell: bash
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$ZENODO_ACCESS_TOKEN" || {
            echo "Install ZENODO_ACCESS_TOKEN in the zenodo-sandbox environment first." >&2
            exit 1
          }
          test "$ZENODO_BASE_URL" = "https://sandbox.zenodo.org/api" || {
            echo "Set zenodo-sandbox variable ZENODO_BASE_URL=https://sandbox.zenodo.org/api first." >&2
            exit 1
          }

      - name: Generate binary payload and validation metadata
        run: node scripts/queue-sandbox-validation.mjs

      - name: Validate metadata
        run: node scripts/validate-metadata.mjs

      - name: Commit the validation release
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uploads/zenodo-sandbox-validation.bin metadata/research.json \
            records/zenodo-sandbox-validation queue/current.json data/research-index.json

          if git diff --cached --quiet; then
            echo "The validation payload is already current; no commit was needed."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "test: queue Zenodo Sandbox validation deposit"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Research Sync
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "The commit changed uploads/**, metadata/research.json, records/zenodo-sandbox-validation, queue/current.json, and data/research-index.json."
          echo "Pushes made with GITHUB_TOKEN do not trigger other workflows automatically, so Research Sync is dispatched explicitly below."
          gh workflow run research-sync.yml --ref "${GITHUB_REF_NAME}" -f publish_zenodo=false

      - name: No new validation payload
        if: steps.commit.outputs.pushed != 'true'
        run: echo "Nothing changed; Research Sync was not triggered."
